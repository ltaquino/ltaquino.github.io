.notes-box { background: #f0faf5; border-radius: 8px; padding: 14px 18px; font-size: 13px; color: #0F6E56; line-height: 1.65; border-left: 3px solid #1D9E75; }

.btn-row { display: flex; gap: 8px; margin-top: 24px; }
.btn { font-size: 13px; padding: 8px 18px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: #f5f5f3; color: #1a1a18; transition: all 0.15s; font-family: inherit; }
.btn:hover { background: #e8e5dc; }

.btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }

let currentProject = 0;
let currentPage = 0;

function renderSidebar() {
  const nav = document.querySelector('.sidebar');
  nav.innerHTML = `<div class="sidebar-logo"><div class="org">SIDC Systems</div><div class="tagline">Presentation Script Guide</div></div><div class="sidebar-title">Projects</div>`;
  projects.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (i === currentProject ? ' active' : '');
    el.innerHTML = `<span class="nav-dot" style="background:${p.color}"></span><span>${p.label}</span>`;
    el.onclick = () => { currentProject = i; currentPage = 0; render(); };
    nav.appendChild(el);
  });
}

function renderContent() {
  const p = projects[currentProject];
  const page = p.pages[currentPage];
  const total = projects.reduce((a, x) => a + x.pages.length, 0);
  let done = 0;
  for (let i = 0; i < currentProject; i++) done += projects[i].pages.length;
  done += currentPage + 1;
  const pct = Math.round((done / total) * 100);

  let tabs = '';
  if (p.pages.length > 1) {
    tabs = '<div class="page-tabs">' + p.pages.map((pg, i) =>
      `<div class="page-tab${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">Page ${i + 1}</div>`
    ).join('') + '</div>';
  }

  const scriptHTML = page.script.map(s =>
    `<div class="script-line"><div class="speaker">${s.speaker}</div>${s.text}</div>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="progress">
      <span>${done} / ${total}</span>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span>${pct}%</span>
    </div>
    <div class="project-header">
      <div class="tag" style="background:${p.tagBg};color:${p.tagColor}">${p.tag}</div>
      <div class="project-title">${page.title}</div>
      <div class="project-subtitle">${page.subtitle}</div>
    </div>
    ${tabs}
    <div class="section">
      <div class="section-label">Presentation script</div>
      <div class="script-box">${scriptHTML}</div>
    </div>
    <div class="section">
      <div class="section-label">Presenter notes</div>
      <div class="notes-box">${page.notes}</div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="prev()" ${currentProject === 0 && currentPage === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="btn btn-primary" onclick="next()" ${currentProject === projects.length - 1 && currentPage === p.pages.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
}

function render() { renderSidebar(); renderContent(); }
function goPage(i) { currentPage = i; render(); }
function next() {
  const p = projects[currentProject];
  if (currentPage < p.pages.length - 1) currentPage++;
  else if (currentProject < projects.length - 1) { currentProject++; currentPage = 0; }
  render();
}
function prev() {
  if (currentPage > 0) currentPage--;
  else if (currentProject > 0) { currentProject--; currentPage = projects[currentProject].pages.length - 1; }
  render();
}

render();
</script>
</body>
</html>
